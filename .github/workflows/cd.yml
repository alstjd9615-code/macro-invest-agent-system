name: CD

on:
  # Trigger after the CI workflow completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Allow manual deployments from the Actions tab
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to HEAD of main)"
        required: false
        default: ""

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Guard — skip the rest of the CD if CI did not pass
  # ---------------------------------------------------------------------------
  guard:
    name: Verify CI passed
    runs-on: ubuntu-latest
    permissions: {}
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI result
        run: |
          echo "CI conclusion: ${{ github.event.workflow_run.conclusion || 'n/a (manual dispatch)' }}"

  # ---------------------------------------------------------------------------
  # Build and push Docker images to GitHub Container Registry
  # ---------------------------------------------------------------------------
  push-images:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.meta-api.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}
      sha: ${{ steps.resolve-sha.outputs.sha }}
    steps:
      - name: Resolve commit SHA
        id: resolve-sha
        run: |
          SHA="${{ github.event.inputs.sha || github.event.workflow_run.head_sha || github.sha }}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-sha.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Docker metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — SSH into the production server and roll out the new images
  # Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH
  # Optional secret:  DEPLOY_PORT (defaults to 22)
  # Required secret:  GHCR_TOKEN — a PAT with read:packages scope used on the
  #                   remote server to pull images from GHCR.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: push-images
    environment: production
    permissions: {}
    steps:
      - name: Validate required deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          test -n "$DEPLOY_HOST"   || (echo "::error::Missing secret DEPLOY_HOST"   && exit 1)
          test -n "$DEPLOY_USER"   || (echo "::error::Missing secret DEPLOY_USER"   && exit 1)
          test -n "$DEPLOY_SSH_KEY"|| (echo "::error::Missing secret DEPLOY_SSH_KEY"&& exit 1)
          test -n "$DEPLOY_PATH"   || (echo "::error::Missing secret DEPLOY_PATH"   && exit 1)
          test -n "$GHCR_TOKEN"    || (echo "::error::Missing secret GHCR_TOKEN"    && exit 1)

      - name: Deploy via SSH + Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          envs: GHCR_TOKEN,DEPLOY_ACTOR
          script: |
            set -euo pipefail

            # Authenticate with GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$DEPLOY_ACTOR" --password-stdin

            # Update source and pull new images
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            docker compose pull
            docker compose up -d --remove-orphans

            # Smoke-test health endpoints
            curl --fail --silent --show-error http://localhost:8000/health >/dev/null
            curl --fail --silent --show-error http://localhost:80/ >/dev/null

            docker logout ghcr.io
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_ACTOR: ${{ github.actor }}

      - name: Deployment summary
        run: |
          {
            echo "## Deployment completed ✅"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| SHA | \`${{ needs.push-images.outputs.sha }}\` |"
            echo "| API image | \`${{ needs.push-images.outputs.api_image }}\` |"
            echo "| Frontend image | \`${{ needs.push-images.outputs.frontend_image }}\` |"
            echo "| Host | \`${{ secrets.DEPLOY_HOST }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
