name: CD
# CD is disabled — the project runs locally via Docker Compose only.
# Remote deployment is not configured. See docs/deployment.md for the
# manual local workflow.
#
# To re-enable: restore the `on:` block below and configure the required
# GitHub secrets (DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm intentional manual run"
        required: true
        default: "no"

jobs:
  disabled:
    name: CD disabled
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: CD is not configured
        run: |
          echo "CD is disabled. Deploy manually:"
          echo "  git pull"
          echo "  docker compose up -d --build"
          echo "  docker compose ps"
          exit 1
