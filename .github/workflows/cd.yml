name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on main
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate required deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$DEPLOY_HOST" || (echo "Missing secret DEPLOY_HOST" && exit 1)
          test -n "$DEPLOY_USER" || (echo "Missing secret DEPLOY_USER" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "Missing secret DEPLOY_SSH_KEY" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing secret DEPLOY_PATH" && exit 1)

      - name: Deploy via SSH + Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            docker compose pull || true
            docker compose up -d --build --remove-orphans

            curl --fail --silent --show-error http://localhost:8000/health >/dev/null
            curl --fail --silent --show-error http://localhost:8080/ >/dev/null

      - name: Deployment summary
        run: |
          {
            echo "## Deployment completed"
            echo ""
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- SHA: \`${{ github.sha }}\`"
            echo "- Host: \`${{ secrets.DEPLOY_HOST }}\`"
            echo "- Health checks: API (/health), Frontend (/)"
          } >> "$GITHUB_STEP_SUMMARY"
