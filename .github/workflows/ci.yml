name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend install + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install backend dependencies
        run: uv sync --all-extras

      - name: Run backend tests
        run: uv run pytest tests -q

  frontend-build:
    name: Frontend install + production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
          else
            echo "Static frontend detected: no package.json, no npm dependencies to install."
          fi

      - name: Run frontend production build
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm run build
          else
            echo "Static frontend detected: verifying production artifact build via Docker image build."
            docker build -f frontend/Dockerfile -t macro-frontend-ci:latest .
          fi

  docker-smoke:
    name: Docker build smoke check (optional)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t macro-api-ci:latest .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t macro-frontend-ci-smoke:latest .
