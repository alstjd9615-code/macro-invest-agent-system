services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — persistent storage for features, signals, and pipeline runs
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-macro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-macro_pass}
      POSTGRES_DB: ${POSTGRES_DB:-macro_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-macro_user} -d ${POSTGRES_DB:-macro_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store for raw data artefacts
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # API — FastAPI application (placeholder; not yet implemented)
  # ---------------------------------------------------------------------------
  # Uncomment when apps/api is ready.
  #
  # api:
  #   build:
  #     context: .
  #     dockerfile: apps/api/Dockerfile
  #   env_file: .env
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy

  # ---------------------------------------------------------------------------
  # Dashboard — lightweight UI placeholder (not yet implemented)
  # ---------------------------------------------------------------------------
  # Uncomment when apps/dashboard is ready.
  #
  # dashboard:
  #   build:
  #     context: .
  #     dockerfile: apps/dashboard/Dockerfile
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api

volumes:
  postgres_data:
  minio_data:
