# Prometheus configuration for local and staging deployments.
#
# Usage:
#   docker compose -f docker-compose.yml up -d
#
# The macro-platform job scrapes the FastAPI /metrics endpoint.
# Adjust `targets` if the API runs on a different host or port.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: macro-platform
    static_configs:
      - targets:
          - api:8000
    metrics_path: /metrics
    scrape_timeout: 10s
